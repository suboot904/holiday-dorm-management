<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>假期留校人员出入管理系统</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #eef7f0;
    color: #1a2e22;
    display: flex;
    justify-content: center;
  }
  .phone {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    background: #eef7f0;
    position: relative;
    overflow: hidden;
  }

  /* 水印 */
  .watermark {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 5;
    opacity: 0.16;
    overflow: hidden;
  }
  .watermark-inner {
    position: absolute;
    top: -30%;
    left: -30%;
    width: 160%;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: 240px;
    transform: rotate(-25deg);
  }
  .watermark-item {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 600;
    color: #3a3a3a;
    white-space: nowrap;
  }

  .content { position: relative; z-index: 1; padding-top: 94px; }

  header {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 420px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 20px 16px;
    background: #ffffff;
    z-index: 10;
    box-sizing: border-box;
  }
  .school-logo-img {
    height: 46px;
    display: block;
  }
  .sys-title {
    margin-left: auto;
    text-align: right;
    font-size: 16px;
    font-weight: 700;
    color: #16241a;
    line-height: 1.3;
  }

  .clock-card {
    margin: 18px 16px 0;
    background: #ffffff;
    border-radius: 20px;
    padding: 26px 20px 22px;
    text-align: center;
    box-shadow: 0 2px 10px rgba(30,110,60,0.06);
    position: relative;
    overflow: hidden;
  }

    background-size: 100% 100%;
    background-position: center;
    background-repeat: no-repeat;
    pointer-events: none;
    z-index: 0;
  }
  .clock-card > * {
    position: relative;
    z-index: 1;
  }
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #eafaf1;
    color: #1f9d55;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 999px;
  }
  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #1f9d55;
  }
  .time {
    margin-top: 18px;
    font-size: 56px;
    font-weight: 800;
    letter-spacing: 1px;
    color: #16241a;
    font-variant-numeric: tabular-nums;
    display: flex;
    align-items: baseline;
    justify-content: center;
  }
  .time-main {
    background: repeating-linear-gradient(90deg,
      #16241a 0px, #16241a 150px,
      #2a9959 175px, #6ee8a4 200px, #2a9959 225px,
      #16241a 250px);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: sweep 2s linear infinite;
  }
  @keyframes sweep {
    from { background-position: 0 0; }
    to   { background-position: 250px 0; }
  }
  .time .ms { font-size: 30px; color: #2fae63; }
  .date-line {
    margin-top: 6px;
    font-size: 15px;
    color: #6b7d70;
  }

  .status-card {
    margin: 16px 16px 0;
    background: #ffffff;
    border-radius: 20px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 10px rgba(30,110,60,0.06);
  }
  .check-circle {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #2fae63;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .check-circle svg { width: 26px; height: 26px; }
  .status-text .title {
    font-size: 19px;
    font-weight: 800;
    color: #1f9d55;
  }
  .status-text .desc {
    margin-top: 4px;
    font-size: 13px;
    color: #6b7d70;
  }

  .section-label {
    margin: 22px 16px 8px;
    font-size: 15px;
    font-weight: 700;
    color: #1a2e22;
  }
  .info-card {
    margin: 0 16px;
    background: #ffffff;
    border-radius: 20px;
    padding: 4px 20px;
    box-shadow: 0 2px 10px rgba(30,110,60,0.06);
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid #f0f0ef;
    font-size: 15px;
  }
  .info-row:last-child { border-bottom: none; }
  .info-row .label { color: #16241a; font-weight: 500; }
  .info-row .value { color: #7c8a80; }
  .info-row .value.accent { color: #2fae63; font-weight: 700; }

  .footer-space { height: 30px; }
</style>
</head>

<div class="phone">
  <div class="watermark">

<script>
  const name = "王震";
  const sid = "2407011178";
  const grid = document.getElementById('watermarkGrid');
  const label = name + "  " + sid;

  function fillWatermark() {
    grid.innerHTML = '';
    const pageHeight = document.querySelector('.phone').scrollHeight;
    const rowHeight = 240;
    // 覆盖旋转后可能超出的范围，按对角线估算再放大一些
    const neededHeight = pageHeight * 1.9 + 400;
    const rows = Math.ceil(neededHeight / rowHeight);
    const total = rows * 2;
    for (let i = 0; i < total; i++) {
      const div = document.createElement('div');
      div.className = 'watermark-item';
      div.textContent = label;
      grid.appendChild(div);
    }
  }
  fillWatermark();
  window.addEventListener('resize', fillWatermark);

  function pad(n) { return n.toString().padStart(2, '0'); }
  const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

  function tick() {
    const now = new Date();
    const h = pad(now.getHours());
    const m = pad(now.getMinutes());
    const s = pad(now.getSeconds());
    const ms = pad(Math.floor(now.getMilliseconds() / 10));
    document.getElementById('hmsPart').textContent = h + ':' + m + ':' + s;
    document.getElementById('msPart').textContent = '.' + ms;
    document.getElementById('dateDisplay').textContent =
      now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 ' + weekdays[now.getDay()];
  }
  tick();
  setInterval(tick, 30);
</script>
